<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pt_tracker</title>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="session-info">
          <input type="text" id="session-name" placeholder="Session Name (e.g., Morning Run)" />
        </div>
        <div id="global-timer">00:00.00</div>
        <div class="controls">
          <button id="start-run" disabled>Start Run</button>
          <button id="add-runner">Add Runner</button>
        </div>
      </header>

      <main id="runner-rows">
        <!-- runners will be injected here -->
      </main>

      <div id="archive-section" style="display: none; padding: 1rem; text-align: center;">
        <button id="archive-session">Archive & Start New Session</button>
      </div>

      <template id="runner-template">
        <div class="runner-row">
          <div class="runner-identity" role="button" aria-label="Runner identity and lap counter">
            <div class="identity-setup">
              <input type="text" class="runner-name" placeholder="Name" />
              <div class="stats-entry">
                <input type="number" class="pushups-input" placeholder="PU" min="0" />
                <input type="number" class="situps-input" placeholder="SU" min="0" />
              </div>
            </div>
            <div class="identity-active" style="display: none;">
              <span class="display-name"></span>
              <span class="display-stats"></span>
              <span class="lap-counter">Laps: 0</span>
            </div>
          </div>
          <div class="runner-actions">
            <button class="lock-btn">Lock</button>
            <button class="finish-btn" disabled>Finish</button>
            <button class="remove-btn">×</button>
          </div>
          <div class="result-display">--:--.--</div>
        </div>
      </template>

      <footer>
        <button id="view-history">View History</button>
        <button id="reset-all">Reset Current</button>
      </footer>

      <dialog id="history-dialog">
        <div class="dialog-content">
          <h2>Session History</h2>
          <div id="history-list">
            <!-- history items will be injected here -->
          </div>
          <div class="dialog-actions">
            <button id="close-history">Close</button>
            <button id="clear-history" class="danger">Clear All History</button>
          </div>
        </div>
      </dialog>

      <dialog id="reset-dialog">
        <form method="dialog">
          <p>Are you sure you want to reset all data? This cannot be undone.</p>
          <div class="dialog-actions">
            <button value="cancel">Cancel</button>
            <button id="confirm-reset" value="default">Yes, Reset All</button>
          </div>
        </form>
      </dialog>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
